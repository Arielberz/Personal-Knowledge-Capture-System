{% extends "base.html" %} {% block content %}
<section class="hero compact">
  <h1>תזכורות</h1>
  <p>תזכורות מבוססות זמן לבדיקה ולמחקר המשך.</p>
</section>

<section class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>תאריך יעד</th>
          <th>שאלה</th>
          <th>סוג</th>
          <th>סטטוס</th>
        </tr>
      </thead>
      <tbody>
        {% for reminder in reminders %}
        <tr>
          <td>{{ reminder.due_date }}</td>
          <td>{{ reminder.question }}</td>
          <td>{{ reminder.reminder_type }}</td>
          <td>{{ reminder.status }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
